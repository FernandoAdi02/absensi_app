{% extends 'base.html' %}

{% block login_content %}
<div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; background: var(--bg);">
    <div style="text-align: center; margin-bottom: 50px;">
        <div style="width: 80px; height: 80px; background: var(--accent); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4);">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1 style="font-size: 2rem;">Daftar Akun</h1>
        <p style="color: var(--text-dim);">Silakan isi data untuk mendaftar</p>
    </div>

    <form method="post" class="card" style="padding: 30px;">
        {% csrf_token %}
        {% for field in form %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim);">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color: var(--danger); font-size: 0.8rem; margin-top: 5px;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="background: var(--accent);">Daftar Sekarang</button>
    </form>

    <p style="text-align: center; margin-top: 30px; color: var(--text-dim); font-size: 0.9rem;">
        Sudah punya akun? <a href="{% url 'login' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login di sini</a>
    </p>
</div>

<style>
    input {
        width: 100%; 
        padding: 12px; 
        border-radius: 12px; 
        border: 1px solid rgba(255,255,255,0.1); 
        background: rgba(15, 23, 42, 0.5); 
        color: white;
    }
    ul.errorlist { display: none; }
</style>
{% endblock %}
