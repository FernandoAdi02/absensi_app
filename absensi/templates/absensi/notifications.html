{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
    <a href="{% url 'profile' %}" style="color: white; text-decoration: none; font-size: 1.2rem;"><i class="fas fa-arrow-left"></i></a>
    <div>
        <h2 style="font-size: 1.5rem;">Notifikasi</h2>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Pesan terbaru untuk Anda</p>
    </div>
</div>

{% for notif in notifications %}
<div class="card" style="padding: 15px; display: flex; gap: 15px; align-items: flex-start;">
    <div style="width: 40px; height: 40px; border-radius: 12px; background: rgba(99, 102, 241, 0.2); color: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <i class="fas fa-info-circle"></i>
    </div>
    <div style="flex: 1;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <p style="font-weight: 600; font-size: 0.95rem;">{{ notif.title }}</p>
            <p style="font-size: 0.7rem; color: var(--text-dim);">{{ notif.time }}</p>
        </div>
        <p style="font-size: 0.85rem; color: var(--text-dim); line-height: 1.4;">{{ notif.desc }}</p>
    </div>
</div>
{% empty %}
<div style="text-align: center; padding: 50px 0; color: var(--text-dim);">
    <i class="fas fa-bell-slash" style="font-size: 2.5rem; margin-bottom: 15px;"></i>
    <p>Belum ada notifikasi baru</p>
</div>
{% endfor %}

{% endblock %}
