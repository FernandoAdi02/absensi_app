{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
    <a href="{% url 'dashboard' %}" style="color: white; text-decoration: none; font-size: 1.2rem;"><i class="fas fa-arrow-left"></i></a>
    <div>
        <h2 style="font-size: 1.5rem;">Riwayat Absensi</h2>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Daftar seluruh kehadiran Anda</p>
    </div>
</div>

{% for attendance in attendances %}
<div class="card" style="padding: 15px; display: flex; align-items: center; gap: 15px;">
    <div style="width: 50px; height: 50px; border-radius: 12px; overflow: hidden; background: #334155;">
        <img src="{{ attendance.foto.url }}" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    <div style="flex: 1;">
        <p style="font-weight: 600; font-size: 0.9rem;">{{ attendance.status }}</p>
        <p style="color: var(--text-dim); font-size: 0.8rem;">{{ attendance.timestamp|date:"d M Y, H:i" }}</p>
    </div>
    <div style="text-align: right;">
        <a href="https://www.google.com/maps?q={{ attendance.latitude }},{{ attendance.longitude }}" target="_blank" style="color: var(--primary); text-decoration: none;">
            <i class="fas fa-map-marker-alt"></i>
            <p style="font-size: 0.6rem; color: var(--text-dim); margin-top: 2px;">Maps</p>
        </a>
    </div>
</div>
{% empty %}
<div style="text-align: center; padding: 50px 0; color: var(--text-dim);">
    <i class="fas fa-history" style="font-size: 3rem; margin-bottom: 15px;"></i>
    <p>Belum ada catatan absensi</p>
</div>
{% endfor %}

{% endblock %}
