{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
    <a href="{% url 'profile' %}" style="color: white; text-decoration: none; font-size: 1.2rem;"><i class="fas fa-arrow-left"></i></a>
    <div>
        <h2 style="font-size: 1.5rem;">Ubah Password</h2>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Ganti kata sandi demi keamanan</p>
    </div>
</div>

<form method="post" class="card" style="padding: 30px;">
    {% csrf_token %}
    {% for field in form %}
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim);">{{ field.label }}</label>
            <input type="password" name="{{ field.name }}" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.5); color: white;" required>
            {% if field.errors %}
                <p style="color: var(--danger); font-size: 0.8rem; margin-top: 5px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary" style="background: var(--primary);">Simpan Perubahan</button>
</form>
{% endblock %}
